<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1460" role="img" aria-labelledby="title desc">
  <title id="title">Idea to TestFlight vertical factory flow</title>
  <desc id="desc">A top-down ViberMode iOS app factory diagram with detailed Product-to-Code stages.</desc>
  
  <defs>
    <filter id="panelShadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="nodeShadow" x="-18%" y="-22%" width="136%" height="144%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#263244"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#e11d48"/>
    </marker>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="bluePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="orangePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="purplePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="greenPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <style>
      .title { font: 800 42px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101827; letter-spacing: 0; }
      .subtitle { font: 600 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .badgeText { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #fff; letter-spacing: 0.4px; }
      .sectionTitle { font: 800 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .sectionCopy { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .laneTitle { font: 800 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4338ca; letter-spacing: 0.4px; }
      .nodeTitle { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .nodeCopy { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .small { font: 700 11.5px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .mono { font: 700 11.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #334155; letter-spacing: 0; }
      .line { fill: none; stroke: #263244; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .greenLine { fill: none; stroke: #059669; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowGreen); }
      .redLine { fill: none; stroke: #e11d48; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 7; marker-end: url(#arrowRed); }
      .plainLine { fill: none; stroke: #263244; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dashLine { fill: none; stroke: #64748b; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1460" fill="url(#page)"/>
  <rect x="82" y="34" width="1036" height="1392" rx="30" fill="#fff" stroke="#d8e0eb" opacity="0.9"/>

  <text x="600" y="78" text-anchor="middle" class="title">Idea to TestFlight</text>
  <text x="600" y="108" text-anchor="middle" class="subtitle">top-down factory flow for generated iOS apps</text>

  
    <g filter="url(#panelShadow)">
      <rect x="130" y="142" width="940" height="190" rx="26" fill="url(#bluePanel)" stroke="#38bdf8" stroke-width="2"/>
    </g>
  
  
    <rect x="158" y="166" width="96" height="30" rx="15" fill="#0284c7"/>
    <text x="206" y="187" text-anchor="middle" class="badgeText">STAGE 1</text>
  
  <text x="282" y="188" class="sectionTitle">App To Idea</text>
  <text x="282" y="216" class="sectionCopy">A small research loop creates and gates ideas. It stops before repo creation.</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="190" y="250" width="150" height="58" rx="16" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
    </g>
    <text x="265" y="276" text-anchor="middle" class="nodeTitle">Signals</text>
    <text x="265" y="295" text-anchor="middle" class="nodeCopy">store data</text><text x="265" y="312" text-anchor="middle" class="nodeCopy">themes</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="412" y="250" width="174" height="58" rx="16" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
    </g>
    <text x="499" y="276" text-anchor="middle" class="nodeTitle">Research Loop</text>
    <text x="499" y="295" text-anchor="middle" class="nodeCopy">app-researcher</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="660" y="250" width="132" height="58" rx="16" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
    </g>
    <text x="726" y="276" text-anchor="middle" class="nodeTitle">Gate</text>
    <text x="726" y="295" text-anchor="middle" class="nodeCopy">ready?</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="875" y="250" width="140" height="58" rx="16" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
    </g>
    <text x="945" y="276" text-anchor="middle" class="nodeTitle">Ready Idea</text>
    <text x="945" y="295" text-anchor="middle" class="nodeCopy">backlog</text>
  
  <path d="M340 279 H412 M586 279 H660 M792 279 H875" class="line"/>
  <path d="M726 250 C716 222 510 222 499 250" class="redLine"/>

  <path d="M600 332 V368" class="line"/>

  
    <g filter="url(#panelShadow)">
      <rect x="130" y="368" width="940" height="172" rx="26" fill="url(#orangePanel)" stroke="#fb923c" stroke-width="2"/>
    </g>
  
  
    <rect x="158" y="392" width="96" height="30" rx="15" fill="#ea580c"/>
    <text x="206" y="413" text-anchor="middle" class="badgeText">STAGE 2</text>
  
  <text x="282" y="414" class="sectionTitle">Bootstrap</text>
  <text x="282" y="442" class="sectionCopy">Prepare a private generated repo from the iOS template and prove the baseline is runnable.</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="202" y="468" width="128" height="48" rx="16" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
    </g>
    <text x="266" y="494" text-anchor="middle" class="nodeTitle">Reserve</text>
    <text x="266" y="513" text-anchor="middle" class="nodeCopy">run</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="402" y="468" width="142" height="48" rx="16" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
    </g>
    <text x="473" y="494" text-anchor="middle" class="nodeTitle">Template</text>
    <text x="473" y="513" text-anchor="middle" class="nodeCopy">create repo</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="616" y="468" width="120" height="48" rx="16" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
    </g>
    <text x="676" y="494" text-anchor="middle" class="nodeTitle">Clone</text>
    <text x="676" y="513" text-anchor="middle" class="nodeCopy">workspace</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="808" y="468" width="140" height="48" rx="16" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
    </g>
    <text x="878" y="494" text-anchor="middle" class="nodeTitle">Baseline</text>
    <text x="878" y="513" text-anchor="middle" class="nodeCopy">build path</text>
  
  <path d="M330 492 H402 M544 492 H616 M736 492 H808" class="line"/>

  <path d="M600 540 V576" class="line"/>

  
    <g filter="url(#panelShadow)">
      <rect x="82" y="576" width="1036" height="560" rx="26" fill="url(#purplePanel)" stroke="#818cf8" stroke-width="2"/>
    </g>
  
  
    <rect x="112" y="602" width="96" height="30" rx="15" fill="#4f46e5"/>
    <text x="160" y="623" text-anchor="middle" class="badgeText">STAGE 3</text>
  
  <text x="236" y="624" class="sectionTitle">Product To Code</text>
  <text x="236" y="652" class="sectionCopy">This is the main build loop: specs become tasks, tasks become code, validation/review route fixes.</text>

  <text x="138" y="700" class="laneTitle">SPECIFICATION</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="138" y="718" width="132" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="204" y="744" text-anchor="middle" class="nodeTitle">Brainstormer</text>
    <text x="204" y="763" text-anchor="middle" class="nodeCopy">options</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="318" y="718" width="110" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="373" y="744" text-anchor="middle" class="nodeTitle">PRD</text>
    <text x="373" y="763" text-anchor="middle" class="nodeCopy">scope</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="476" y="718" width="140" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="546" y="744" text-anchor="middle" class="nodeTitle">UX Designer</text>
    <text x="546" y="763" text-anchor="middle" class="nodeCopy">flows</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="664" y="718" width="142" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="735" y="744" text-anchor="middle" class="nodeTitle">Stories</text>
    <text x="735" y="763" text-anchor="middle" class="nodeCopy">AC</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="854" y="718" width="150" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="929" y="744" text-anchor="middle" class="nodeTitle">Spec Review</text>
    <text x="929" y="763" text-anchor="middle" class="nodeCopy">approve</text>
  
  <path d="M270 747 H318 M428 747 H476 M616 747 H664 M806 747 H854" class="line"/>

  <text x="138" y="828" class="laneTitle">IMPLEMENTATION</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="138" y="846" width="150" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="213" y="872" text-anchor="middle" class="nodeTitle">Task Planner</text>
    <text x="213" y="891" text-anchor="middle" class="nodeCopy">tasks.json</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="352" y="846" width="190" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="447" y="872" text-anchor="middle" class="nodeTitle">Implementation</text>
    <text x="447" y="891" text-anchor="middle" class="nodeCopy">one task/run</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="606" y="846" width="164" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="688" y="872" text-anchor="middle" class="nodeTitle">Runtime</text>
    <text x="688" y="891" text-anchor="middle" class="nodeCopy">build + smoke</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="834" y="846" width="170" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="919" y="872" text-anchor="middle" class="nodeTitle">Experience</text>
    <text x="919" y="891" text-anchor="middle" class="nodeCopy">UX gate</text>
  
  <path d="M288 875 H352 M542 875 H606 M770 875 H834" class="line"/>
  <path d="M929 904 V948" class="line"/>

  <text x="138" y="958" class="laneTitle">REVIEW + ROUTING</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="138" y="976" width="174" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="225" y="1002" text-anchor="middle" class="nodeTitle">Remediation</text>
    <text x="225" y="1021" text-anchor="middle" class="nodeCopy">route fixes</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="448" y="976" width="156" height="58" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <text x="526" y="1002" text-anchor="middle" class="nodeTitle">Reviewer</text>
    <text x="526" y="1021" text-anchor="middle" class="nodeCopy">final gate</text>
  
  <g filter="url(#nodeShadow)">
    <rect x="770" y="976" width="200" height="58" rx="29" fill="#312e81"/>
  </g>
  <text x="870" y="1012" text-anchor="middle" class="badgeText">Build Ready</text>
  <path d="M929 948 C894 940 684 940 526 976" class="redLine"/>
  <text x="744" y="942" text-anchor="middle" class="small">validation or review fails</text>
  <path d="M312 1005 C360 1005 352 875 352 875" class="dashLine"/>
  <path d="M604 1005 H770" class="greenLine"/>
  <text x="682" y="990" text-anchor="middle" class="small">approved</text>

  
    <rect x="160" y="1082" width="150" height="32" rx="16" fill="#fff" stroke="#c7d2fe"/>
    <text x="235" y="1103" text-anchor="middle" class="mono">product-to-spec</text>
  
  
    <rect x="338" y="1082" width="122" height="32" rx="16" fill="#fff" stroke="#c7d2fe"/>
    <text x="399" y="1103" text-anchor="middle" class="mono">spec-to-code</text>
  
  
    <rect x="488" y="1082" width="178" height="32" rx="16" fill="#fff" stroke="#c7d2fe"/>
    <text x="577" y="1103" text-anchor="middle" class="mono">experience-hardening</text>
  
  
    <rect x="694" y="1082" width="174" height="32" rx="16" fill="#fff" stroke="#c7d2fe"/>
    <text x="781" y="1103" text-anchor="middle" class="mono">remediation-routing</text>
  

  <path d="M870 1136 V1172" class="line"/>

  
    <g filter="url(#panelShadow)">
      <rect x="130" y="1172" width="940" height="178" rx="26" fill="url(#greenPanel)" stroke="#34d399" stroke-width="2"/>
    </g>
  
  
    <rect x="158" y="1196" width="96" height="30" rx="15" fill="#059669"/>
    <text x="206" y="1217" text-anchor="middle" class="badgeText">STAGE 4</text>
  
  <text x="282" y="1218" class="sectionTitle">TestFlight</text>
  <text x="282" y="1246" class="sectionCopy">Run release gates, sign and upload the app, then write delivery evidence.</text>
  
    <g filter="url(#nodeShadow)">
      <rect x="198" y="1274" width="132" height="48" rx="16" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
    </g>
    <text x="264" y="1300" text-anchor="middle" class="nodeTitle">Preflight</text>
    <text x="264" y="1319" text-anchor="middle" class="nodeCopy">gates</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="402" y="1274" width="140" height="48" rx="16" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
    </g>
    <text x="472" y="1300" text-anchor="middle" class="nodeTitle">Build + Sign</text>
    <text x="472" y="1319" text-anchor="middle" class="nodeCopy">archive</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="614" y="1274" width="154" height="48" rx="16" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
    </g>
    <text x="691" y="1300" text-anchor="middle" class="nodeTitle">Upload</text>
    <text x="691" y="1319" text-anchor="middle" class="nodeCopy">internal</text>
  
  
    <g filter="url(#nodeShadow)">
      <rect x="840" y="1274" width="140" height="48" rx="16" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
    </g>
    <text x="910" y="1300" text-anchor="middle" class="nodeTitle">Evidence</text>
    <text x="910" y="1319" text-anchor="middle" class="nodeCopy">state + git</text>
  
  <path d="M330 1298 H402 M542 1298 H614 M768 1298 H840" class="greenLine"/>
  
    <rect x="344" y="1338" width="160" height="32" rx="16" fill="#fff" stroke="#bbf7d0"/>
    <text x="424" y="1359" text-anchor="middle" class="mono">ios-submitter</text>
  
  
    <rect x="520" y="1338" width="196" height="32" rx="16" fill="#fff" stroke="#bbf7d0"/>
    <text x="618" y="1359" text-anchor="middle" class="mono">ios-submit-testflight</text>
  
  
    <rect x="732" y="1338" width="174" height="32" rx="16" fill="#fff" stroke="#bbf7d0"/>
    <text x="819" y="1359" text-anchor="middle" class="mono">Fastlane / Apple</text>
  

  <text x="600" y="1400" text-anchor="middle" class="small">ViberMode: app-opportunity-research -> daily-ios-app-pipeline -> bootstrap -> product-to-code -> ios-submit-testflight</text>
</svg>
