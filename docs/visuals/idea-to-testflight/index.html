<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Idea to TestFlight Visuals</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3f8;
        color: #111827;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 1480px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      p {
        margin: 0;
        color: #475569;
        font-weight: 600;
      }

      .visual-grid {
        display: grid;
        gap: 28px;
      }

      figure {
        margin: 0;
        padding: 20px;
        background: #fff;
        border: 1px solid #d8e0eb;
        border-radius: 18px;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }

      figcaption {
        margin: 0 0 14px;
        color: #334155;
        font-weight: 800;
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Idea to TestFlight Visuals</h1>
        <p>Static, deployable source for the generated iOS app factory diagrams.</p>
      </header>
      <section class="visual-grid">
        <figure>
          <figcaption>Vertical detailed figure</figcaption>
          <div id="detailed"></div>
        </figure>
        <figure>
          <figcaption>Compact stage figure</figcaption>
          <div id="compact"></div>
        </figure>
      </section>
    </main>
    <script type="module">
      import { renderDetailedSvg, renderCompactSvg } from "./diagram.mjs";

      document.querySelector("#detailed").innerHTML = renderDetailedSvg();
      document.querySelector("#compact").innerHTML = renderCompactSvg();
    </script>
  </body>
</html>
