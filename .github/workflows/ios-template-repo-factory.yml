name: Daily iOS Repo Factory

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      new_repo_name:
        description: Optional repo name. Empty creates ios-app-YYYY-MM-DD using the Europe/Istanbul date.
        required: false
        default: ""
      dry_run:
        description: Check token and template access without creating a repo.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  create-repo:
    name: Create repo from template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ViberMode
        uses: actions/checkout@v5

      - name: Resolve repo name
        id: repo-name
        env:
          REQUESTED_REPO_NAME: ${{ github.event.inputs.new_repo_name || '' }}
        shell: bash
        run: |
          set -euo pipefail

          repo_name="$REQUESTED_REPO_NAME"
          if [ -z "$repo_name" ]; then
            repo_name="ios-app-$(TZ=Europe/Istanbul date +%F)"
          fi

          echo "repo_name=$repo_name" >> "$GITHUB_OUTPUT"

      - name: Check GH_TOKEN secret
        env:
          HAS_GH_TOKEN: ${{ secrets.GH_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$HAS_GH_TOKEN" != "true" ]; then
            echo "::error::GH_TOKEN repository secret is not configured in the ViberMode repository."
            exit 1
          fi

      - name: Create repository
        id: create
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TEMPLATE_OWNER: KantAkademi2
          TEMPLATE_REPO: ios-boilerplate
          DESTINATION_OWNER: ViberBoyz
          NEW_REPO_NAME: ${{ steps.repo-name.outputs.repo_name }}
          REPO_PRIVATE: "true"
          INCLUDE_ALL_BRANCHES: "false"
          MAX_NAME_ATTEMPTS: "50"
          DRY_RUN: ${{ github.event.inputs.dry_run || false }}
          DESCRIPTION: Generated from KantAkademi2 ios-boilerplate
        run: node scripts/github-create-template-repo.mjs

      - name: Print result
        run: |
          echo "status=${{ steps.create.outputs.status }}"
          echo "repo=${{ steps.create.outputs.full_name }}"
          echo "url=${{ steps.create.outputs.html_url }}"
