required_fields:
  - "run_id"
  - "workflow_name"
  - "strategy_profile_id"
  - "policy_version"
  - "decision_timestamp"
  - "market_id"
  - "trade_id"
  - "position_id"
  - "action"
  - "side"
  - "size"
  - "confidence"
  - "entry_reason"
  - "exit_reason"
  - "skip_reason"
  - "thesis"
  - "invalidation"
  - "result"
  - "realized_pnl"
  - "unrealized_pnl"

field_definitions:
  workflow_name: "Operational workflow that produced the action."
  strategy_profile_id: "Strategy profile that governed the decision."
  policy_version: "Exact threshold set active at decision time."
  run_id: "Unique identifier for one workflow run."

minimum_journal_record:
  - "run_id"
  - "workflow_name"
  - "strategy_profile_id"
  - "policy_version"
  - "market_id"
  - "action"
  - "confidence"
  - "thesis"
  - "invalidation"
  - "skip_reason"
  - "result"
  - "portfolio_state"

review_groupings:
  - "strategy_profile_id"
  - "policy_version"
  - "workflow_name"
  - "market_category"
  - "entry_reason"
  - "exit_reason"

rules:
  - "Keep the schema stable even if prompts change."
  - "Emit attribution metadata from the runtime, not from manual post-processing."
  - "Optimize for consistent tracking before richer prose."
